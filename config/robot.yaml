# GP8 robot configuration (source: Yaskawa GP8 datasheet)
# NOTE: 동일한 관절 속도 제한 값이 아래 파일에도 존재
#   - src/gp8_sorting/robots/gp8.py (_VELOCITY_LIMITS, rad/s)
#   - configs/robot/gp8.yaml (max_joint_velocity_deg, deg/s)
# 시뮬/실제 로봇 파라미터는 독립 관리 (DR 등으로 시뮬 값만 변경 가능)
robot_ip: "192.168.255.1"
controller: "yrc1000"

controller_joint_names:
  - "joint_1_s"
  - "joint_2_l"
  - "joint_3_u"
  - "joint_4_r"
  - "joint_5_b"
  - "joint_6_t"

robot_description_planning:
  joint_limits:
    joint_1_s:
      has_velocity_limits: true
      max_velocity: 7.9412
      has_acceleration_limits: false
      max_acceleration: 0
    joint_2_l:
      has_velocity_limits: true
      max_velocity: 6.7495
      has_acceleration_limits: false
      max_acceleration: 0
    joint_3_u:
      has_velocity_limits: true
      max_velocity: 9.0757
      has_acceleration_limits: false
      max_acceleration: 0
    joint_4_r:
      has_velocity_limits: true
      max_velocity: 9.5993
      has_acceleration_limits: false
      max_acceleration: 0
    joint_5_b:
      has_velocity_limits: true
      max_velocity: 9.5993
      has_acceleration_limits: false
      max_acceleration: 0
    joint_6_t:
      has_velocity_limits: true
      max_velocity: 17.4845
      has_acceleration_limits: false
      max_acceleration: 0
  cartesian_limits:
    max_trans_vel: 3
    max_trans_acc: 2.25
    max_trans_dec: -5
    max_rot_vel: 6.28
